name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly heartbeat so the off-PR jobs (Windows build, mobile e2e) catch
    # environment drift even during quiet weeks.
    - cron: "0 3 * * 1"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # This job only reads the repo; don't leave the token in git config.
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Run Tests
        run: bun run test

      - name: Build
        run: bun run build:dev

      - name: E2E (serve static export)
        run: |
          # Serve the static export and run the bun e2e specs against it.
          # The specs skip when no server responds, so fail loudly if the
          # server never comes up — otherwise e2e would be a silent no-op.
          bunx serve@14 out -l 3000 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 >/dev/null 2>&1; then break; fi
            sleep 1
          done
          if ! curl -sf http://localhost:3000 >/dev/null 2>&1; then
            echo "Static server failed to start on :3000" >&2
            exit 1
          fi
          bun run test:e2e
          STATUS=$?
          kill "$SERVER_PID" 2>/dev/null || true
          exit $STATUS

  windows-build:
    name: Windows build
    runs-on: windows-latest
    # Windows is a supported target that has shipped a string of blind fixes
    # (bun-installer node_modules layout, stale dev-types validator, path
    # handling) with zero CI coverage. Build-only coverage via the documented
    # npm-install path (docs/TROUBLESHOOTING.md "Windows: use npm install")
    # catches the next regression. Kept off the PR loop for speed; runs on
    # main pushes, manual dispatch, and the weekly schedule.
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Bun (runtime for build scripts)
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.11

      - name: Install dependencies with npm
        # bun's installer is unreliable on Windows (symlinked isolated store
        # breaks shiki/postcss resolution; hoisted linker corrupts bin shims).
        # npm's flat layout is the documented Windows path; bun.lock stays the
        # source of truth and package-lock.json is git-ignored.
        run: npm install

      - name: Build (production)
        run: bun run build

  mobile-e2e:
    name: Mobile e2e (Playwright)
    runs-on: ubuntu-latest
    # The 16-device mobile-compat matrix previously only ran manually, so
    # mobile regressions shipped unnoticed. Kept off the PR loop (browser
    # downloads + 16 projects are slow); runs on main pushes, manual
    # dispatch, and the weekly schedule.
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static export
        run: bun run build:dev

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium webkit

      - name: Run mobile compatibility tests
        # CI=true makes playwright.config.ts serve the built out/ directory
        # instead of starting the dev server.
        run: bun run test:mobile

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  production-build:
    name: Production build (full)
    runs-on: ubuntu-latest
    # The full production build (image optimization + prod Pagefind path) is
    # ~1-2 min heavier than build:dev and exercises the export-only paths PRs
    # don't. Gated to manual runs so it never slows the PR loop — trigger it
    # from the Actions tab before a release.
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # This job only reads the repo; don't leave the token in git config.
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (production)
        run: bun run build
